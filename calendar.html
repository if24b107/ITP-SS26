<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico">
    <title>Kalender - JAMMM Together</title>
</head>
<body>
    <div id="navbar-placeholder"></div>
    
    <!-- Hauptinhalt: Kalender -->
    <main class="container my-5">
        <div class="calendar-container">
            
            <!-- Kalender Kopf mit Monat und Navigation -->
            <div class="calendar-header">
                <div class="month-year" id="monthYear">März 2026</div>
                <div class="nav-buttons">
                    <button class="calendar-nav-btn" id="prevMonthBtn">◀ Vorheriger</button>
                    <button class="calendar-nav-btn" id="todayBtn">Heute</button>
                    <button class="calendar-nav-btn" id="nextMonthBtn">Nächster ▶</button>
                </div>
            </div>

            <!-- Wochentage -->
            <div class="weekdays">
                <div class="weekday">Mo</div>
                <div class="weekday">Di</div>
                <div class="weekday">Mi</div>
                <div class="weekday">Do</div>
                <div class="weekday">Fr</div>
                <div class="weekday">Sa</div>
                <div class="weekday">So</div>
            </div>

            <!-- Kalender Grid -->
            <div class="calendar-grid" id="calendarGrid"></div>

        </div>
    </main>

    <script>
        // Aktuelles Datum
        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();

        // Heutiges Datum für Highlight
        const todayYear = currentDate.getFullYear();
        const todayMonth = currentDate.getMonth();
        const todayDay = currentDate.getDate();

        // Monatsnamen Deutsch
        const monthNames = [
            "Januar", "Februar", "März", "April", "Mai", "Juni",
            "Juli", "August", "September", "Oktober", "November", "Dezember"
        ];

        // Prüft, ob ein Tag der heutige Tag ist
        function isToday(year, month, day) {
            return (year === todayYear && month === todayMonth && day === todayDay);
        }

        // Kalender rendern
        function renderCalendar() {
            document.getElementById("monthYear").innerHTML = `${monthNames[currentMonth]} ${currentYear}`;

            let firstDay = new Date(currentYear, currentMonth, 1);
            let startOffset = firstDay.getDay();
            startOffset = (startOffset === 0) ? 6 : startOffset - 1;

            let daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

            const grid = document.getElementById("calendarGrid");
            grid.innerHTML = "";

            // Tage aus Vormonat
            for (let i = startOffset - 1; i >= 0; i--) {
                let prevMonthDay = daysInPrevMonth - i;
                let prevMonth = currentMonth - 1;
                let prevYear = currentYear;
                if (prevMonth < 0) {
                    prevMonth = 11;
                    prevYear--;
                }
                
                const dayDiv = document.createElement("div");
                dayDiv.className = "calendar-day other-month";
                dayDiv.innerHTML = `<div class="day-number">${prevMonthDay}</div>`;
                grid.appendChild(dayDiv);
            }

            // Tage des aktuellen Monats
            for (let day = 1; day <= daysInMonth; day++) {
                const dayDiv = document.createElement("div");
                dayDiv.className = "calendar-day";
                dayDiv.innerHTML = `<div class="day-number">${day}</div>`;
                
                // Highlight für heutigen Tag
                if (isToday(currentYear, currentMonth, day)) {
                    dayDiv.classList.add("today-highlight");
                }
                
                grid.appendChild(dayDiv);
            }

            // Tage aus nächstem Monat
            let totalCells = 42;
            let currentCells = grid.children.length;
            let nextMonthDay = 1;
            
            for (let i = currentCells; i < totalCells; i++) {
                const dayDiv = document.createElement("div");
                dayDiv.className = "calendar-day other-month";
                dayDiv.innerHTML = `<div class="day-number">${nextMonthDay}</div>`;
                grid.appendChild(dayDiv);
                nextMonthDay++;
            }
        }

        // Navigation: Vorheriger Monat
        document.getElementById("prevMonthBtn").addEventListener("click", function() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        });

        // Navigation: Nächster Monat
        document.getElementById("nextMonthBtn").addEventListener("click", function() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        });

        // Navigation: Heute
        document.getElementById("todayBtn").addEventListener("click", function() {
            currentDate = new Date();
            currentYear = currentDate.getFullYear();
            currentMonth = currentDate.getMonth();
            renderCalendar();
        });

        // Kalender initial laden
        renderCalendar();
    </script>
    <script src="navbar-loader.js"></script>
</body>
</html>
