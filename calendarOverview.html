<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Kalender & Termine</title>
</head>

<body>
<div id="navbar-placeholder"></div>

<main class="container my-5">

    <h1 class="section-title text-center mb-5">Kalender & Termine</h1>

    <div class="row justify-content-center g-4">

        <!-- ALLGEMEINER KALENDER -->
        <div class="col-md-5">
            <div class="service-card text-center">
                <div class="icon-wrapper">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <h3>Allgemeiner Kalender</h3>
                <p>Alle eure Termine, Meetings und Planungen im Überblick.</p>

                <a href="calendar.html" class="btn btn-primary">
                    Öffnen
                </a>
            </div>
        </div>

        <!-- WEDDING DATE -->
        <div class="col-md-5">
            <div class="service-card text-center">
                <div class="icon-wrapper">
                    <i class="fas fa-heart"></i>
                </div>
                <h3>Hochzeitsdatum & Countdown</h3>
                <p>Setzt euer Hochzeitsdatum und seht euren persönlichen Countdown.</p>

                <a href="weddingDate.html" class="btn btn-primary">
                    Öffnen
                </a>
            </div>
        </div>

    </div>

</main>

<script src="js/auth-nav.js"></script> 
<script src="navbar-loader.js"></script>
