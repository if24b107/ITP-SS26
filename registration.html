<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts + Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <link rel="stylesheet" href="style.css">

  <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico">

  <title>Registrieren – JAMMM Together</title>
</head>

<body>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <!-- REGISTER SECTION -->
  <section class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    
    <div class="login-card p-5">
      
      <h2 class="text-center mb-4">Registrieren</h2>
      <p class="text-center text-muted mb-4">Erstelle dein Konto:</p>

      <form onsubmit="register(event)">
        
        <!-- Name -->
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" placeholder="Max Mustermann" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">E-Mail</label>
          <input type="email" id= email class="form-control" placeholder="deine@email.com" required>
        </div>

        <!-- Passwort -->
        <div class="mb-3">
          <label class="form-label">Passwort</label>
          <input type="password" id= password class="form-control" placeholder="••••••••" required>
        </div>

        <!-- Passwort bestätigen -->
        <div class="mb-3">
          <label class="form-label">Passwort bestätigen</label>
          <input type="password" class="form-control" placeholder="••••••••" required>
        </div>

        <!-- Button -->
        <button type="submit" class="btn btn-primary w-100 login-btn-main">
          Registrieren
        </button>

        <!-- Zusatzlinks -->
        <div class="text-center mt-2">
          <span>Schon ein Konto?</span>
          <a href="login.html" class="small-link">Einloggen</a>
        </div>

      </form>

    </div>

  </section>

  <!-- Scripts unvollständig; Testversion-->
  <script> 
    //registration
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="navbar-loader.js"></script>

</body>
</html>
