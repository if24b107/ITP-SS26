<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts + Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <link rel="stylesheet" href="style.css">

  <title>Login – JAMMM Together</title>
</head>

<body>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <!-- LOGIN SECTION -->
  <section class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    
    <div class="login-card p-5">
      
      <h2 class="text-center mb-4">Login</h2>
      <p class="text-center text-muted mb-4">Bitte zum Anmelden ausfüllen:</p>

      <form onsubmit="login(event)"> <!-- für login Funktionalität-->
        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">E-Mail</label>
          <input type="email" id="email" class="form-control" placeholder="deine@email.com">
        </div>

        <!-- Passwort -->
        <div class="mb-3">
          <label class="form-label">Passwort</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••">
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn btn-primary w-100 login-btn-main">
          Einloggen
        </button>

        <!-- Zusatzlinks -->
        <div class="text-center mt-2">
          <span>Noch kein Konto?</span>
          <a href="#" class="small-link">Registrieren</a>
        </div>

      </form>

    </div>

  </section>

  <!-- Scripts -->
   

  <script src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="navbar-loader.js"></script>

</body>
</html>
